<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stream Player</title>
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 40px;
      background-color: #f5f5f5;
    }
    h1 {
      color: #333;
    }
    video {
      width: 100%;
      max-width: 800px;
      border: 2px solid #333;
      border-radius: 8px;
      background-color: black;
    }
    #urlInput {
      width: 70%;
      padding: 8px;
      margin-top: 20px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #playBtn {
      padding: 8px 16px;
      margin-left: 10px;
      border: none;
      background-color: #0078d7;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }
    #playBtn:hover {
      background-color: #005fa3;
    }
  </style>
</head>
<body>
  <h1>Stream Player</h1>
  
  <!-- Video element -->
  <video id="videoPlayer" controls autoplay></video>
  
  <!-- Input box for custom stream URLs -->
  <div>
    <input id="urlInput" type="text" placeholder="Paste .mpd URL here" />
    <button id="playBtn">Play</button>
  </div>

  <script>
    // Default proxy URL (your Worker)
    var defaultUrl = "https://wild-pine-d773.maketest.workers.dev/";

    // Initialize dash.js player
    var player = dashjs.MediaPlayer().create();
    player.initialize(document.querySelector("#videoPlayer"), defaultUrl, true);

    // Allow user to paste a custom .mpd URL
    document.getElementById("playBtn").addEventListener("click", function() {
      var customUrl = document.getElementById("urlInput").value.trim();
      if (customUrl) {
        // If you want to proxy arbitrary URLs, you can extend your Worker
        // to accept ?src=<url>. For now, this just plays the pasted URL directly.
        player.attachSource(customUrl);
      }
    });
  </script>
</body>
</html>
